{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<section class="hero">
  <h1>Home</h1>
  {% if current_user.is_authenticated %}
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">Dashboard</a>
  {% else %}
    <a href="{{ url_for('auth.register') }}" class="btn btn-primary">Register</a>
    <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">Sign in</a>
  {% endif %}
</section>
{% endblock %}
