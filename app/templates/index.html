{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="py-16 text-center">
  <h1 class="text-3xl font-bold mb-6">Home</h1>
  <div class="flex justify-center gap-3">
    {% if current_user.is_authenticated %}
      <a href="{{ url_for('main.dashboard') }}" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 text-sm">Dashboard</a>
    {% else %}
      <a href="{{ url_for('auth.register') }}" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 text-sm">Register</a>
      <a href="{{ url_for('auth.login') }}" class="bg-gray-200 text-gray-800 px-4 py-2 rounded hover:bg-gray-300 text-sm">Sign in</a>
    {% endif %}
  </div>
</div>
{% endblock %}
