[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["B008"]

[tool.ruff.lint.isort]
known-first-party = ["app", "config"]

[tool.pytest.ini_options]
testpaths = ["tests"]
env = ["FLASK_ENV=testing"]
addopts = "--tb=short -q"
